<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stuart Friedberg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&family=Work+Sans:wght@300;400;500&family=DM+Serif+Display&family=Libre+Caslon+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
  /* ------------------------------------------------------------------
     Tweakable defaults (host may rewrite this block on disk)
  ------------------------------------------------------------------- */
</style>

<script>
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "theme": "warm",
    "typePairing": "editorial"
  }/*EDITMODE-END*/;
</script>

<style>
  :root {
    --bg: #f7f5f1;
    --paper: #fbfaf7;
    --ink: #1a1816;
    --ink-soft: #55504a;
    --ink-quiet: #8a857e;
    --rule: #dcd6cc;
    --accent: #6b4a2b;

    --f-display: "EB Garamond", "Cormorant Garamond", Georgia, serif;
    --f-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --f-meta: "Inter", sans-serif;

    --max: 1440px;
    --gutter: clamp(20px, 4vw, 56px);
  }

  /* ---- Theme variants ---- */
  [data-theme="dark"] {
    --bg: #141210;
    --paper: #19161422;
    --ink: #ece7df;
    --ink-soft: #a8a29a;
    --ink-quiet: #6f6a62;
    --rule: #2a2622;
    --accent: #c9a27a;
  }
  [data-theme="warm"] {
    --bg: #ebe1d3;
    --paper: #f0e7da;
    --ink: #2a1f15;
    --ink-soft: #6b5a48;
    --ink-quiet: #9a8870;
    --rule: #cfc0a8;
    --accent: #8b3a1f;
  }

  /* ---- Type pairings ---- */
  [data-type="editorial"] {
    --f-display: "EB Garamond", Georgia, serif;
    --f-body: "Inter", sans-serif;
    --f-meta: "Inter", sans-serif;
  }
  [data-type="modern"] {
    --f-display: "Work Sans", "Inter", sans-serif;
    --f-body: "Work Sans", "Inter", sans-serif;
    --f-meta: "Work Sans", sans-serif;
  }
  [data-type="classical"] {
    --f-display: "Libre Caslon Text", "EB Garamond", serif;
    --f-body: "Libre Caslon Text", Georgia, serif;
    --f-meta: "Inter", sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--f-body);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.4s ease, color 0.4s ease;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  h1, h2, h3, h4 { font-family: var(--f-display); font-weight: 400; letter-spacing: -0.01em; margin: 0; }
  .serif-italic { font-style: italic; font-family: var(--f-display); }

  /* ---- Nav ---- */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: color-mix(in oklab, var(--bg) 85%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
  }
  .nav-inner {
    max-width: var(--max);
    margin: 0 auto;
    padding: 18px var(--gutter);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 40px;
  }
  .brand {
    font-family: var(--f-display);
    font-size: 18px;
    letter-spacing: 0.02em;
  }
  .brand .given { font-style: italic; color: var(--ink-soft); margin-right: 6px; }
  .nav-links {
    display: flex;
    gap: clamp(16px, 3vw, 36px);
    font-family: var(--f-meta);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .nav-links button {
    position: relative;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .nav-links button:hover { color: var(--ink); }
  .nav-links button.active { color: var(--ink); }
  .nav-links button.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: var(--ink);
  }
  @media (max-width: 720px) {
    .nav-links { gap: 14px; font-size: 10px; }
    .brand { font-size: 15px; }
  }

  /* ---- Sections ---- */
  .section {
    max-width: var(--max);
    margin: 0 auto;
    padding: clamp(60px, 10vw, 140px) var(--gutter);
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 40px;
    padding-bottom: 28px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--rule);
  }
  .section-head .eyebrow {
    font-family: var(--f-meta);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-quiet);
  }
  .section-head h2 {
    font-size: clamp(32px, 4.5vw, 56px);
    line-height: 1.05;
  }
  .section-head .count {
    font-family: var(--f-meta);
    font-size: 12px;
    color: var(--ink-quiet);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  /* ---- Hero ---- */
  .hero {
    max-width: var(--max);
    margin: 0 auto;
    padding: clamp(48px, 8vw, 96px) var(--gutter) clamp(60px, 9vw, 120px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(32px, 6vw, 80px);
    align-items: end;
  }
  .hero-text h1 {
    font-size: clamp(44px, 7vw, 92px);
    line-height: 0.98;
    letter-spacing: -0.02em;
  }
  .hero-text h1 .line2 {
    display: block;
    font-style: italic;
    color: var(--ink-soft);
    padding-left: clamp(30px, 6vw, 80px);
  }
  .hero-text .lede {
    margin-top: 28px;
    max-width: 38ch;
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.65;
  }
  .hero-text .meta-row {
    margin-top: 36px;
    display: flex;
    gap: 28px;
    font-family: var(--f-meta);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-quiet);
  }
  .hero-feature {
    position: relative;
    aspect-ratio: 1/1;
    overflow: hidden;
    background: var(--paper);
    border: 1px solid var(--rule);
  }
  .hero-feature img { width: 100%; height: 100%; object-fit: cover; }
  .hero-feature .tag {
    position: absolute;
    bottom: 14px; left: 14px;
    font-family: var(--f-meta);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--bg);
    color: var(--ink);
    padding: 6px 10px;
    border: 1px solid var(--rule);
  }
  @media (max-width: 820px) {
    .hero { grid-template-columns: 1fr; }
    .hero-text h1 .line2 { padding-left: 20px; }
  }

  /* ---- Gallery grid ---- */
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(20px, 3vw, 40px) clamp(16px, 2.5vw, 32px);
  }
  @media (max-width: 900px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .gallery { grid-template-columns: 1fr; } }

  .piece {
    cursor: zoom-in;
    transition: transform 0.35s ease;
  }
  .piece:hover { transform: translateY(-2px); }
  .piece .frame {
    background: var(--paper);
    border: 1px solid var(--rule);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow 0.35s ease;
  }
  .piece:hover .frame { box-shadow: 0 18px 40px -22px rgba(0,0,0,0.25); }
  .piece .frame img { width: 100%; height: 100%; object-fit: cover; }
  .piece-meta {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: baseline;
  }
  .piece-meta .title {
    font-family: var(--f-display);
    font-size: 17px;
    font-style: italic;
    color: var(--ink);
  }
  .piece-meta .detail {
    font-family: var(--f-meta);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-quiet);
    white-space: nowrap;
  }

  /* Placeholder painterly tiles */
  .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-align: center;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .placeholder::after {
    content: "";
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 2px,
      transparent 2px,
      transparent 8px
    );
    pointer-events: none;
  }

  /* ---- Shows ---- */
  .show-feature {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: clamp(32px, 5vw, 64px);
    margin-bottom: 72px;
  }
  .show-feature .show-img {
    aspect-ratio: 4/3;
    background: var(--paper);
    border: 1px solid var(--rule);
    overflow: hidden;
  }
  .show-feature .show-body .badge {
    display: inline-block;
    font-family: var(--f-meta);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 10px;
    margin-bottom: 20px;
  }
  .show-feature h3 {
    font-size: clamp(28px, 3.5vw, 42px);
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .show-feature .venue {
    font-family: var(--f-meta);
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }
  .show-feature p { color: var(--ink-soft); max-width: 52ch; margin: 0 0 26px 0; }

  .show-archive {
    border-top: 1px solid var(--rule);
  }
  .archive-row {
    display: grid;
    grid-template-columns: 80px 1fr 1.4fr 1fr 24px;
    gap: 24px;
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
    align-items: baseline;
    font-size: 14px;
  }
  .archive-row .year {
    font-family: var(--f-meta);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--ink-quiet);
  }
  .archive-row .title {
    font-family: var(--f-display);
    font-style: italic;
    font-size: 19px;
  }
  .archive-row .venue {
    color: var(--ink-soft);
    font-size: 13px;
  }
  .archive-row .city {
    font-family: var(--f-meta);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    text-align: right;
  }
  .archive-row .arrow {
    text-align: right;
    color: var(--ink-quiet);
    font-family: var(--f-meta);
    font-size: 16px;
  }
  @media (max-width: 820px) {
    .show-feature { grid-template-columns: 1fr; }
    .archive-row { grid-template-columns: 60px 1fr 1fr; }
    .archive-row .city, .archive-row .arrow { display: none; }
  }

  /* ---- About ---- */
  .about {
    display: grid;
    grid-template-columns: 0.9fr 1.3fr;
    gap: clamp(32px, 5vw, 80px);
    align-items: start;
  }
  .about-portrait {
    aspect-ratio: 4/5;
    background: var(--paper);
    border: 1px solid var(--rule);
    overflow: hidden;
  }
  .about-body p {
    font-size: 16px;
    line-height: 1.75;
    color: var(--ink-soft);
    margin: 0 0 1.2em 0;
  }
  .about-body p:first-of-type::first-letter {
    font-family: var(--f-display);
    font-size: 3.4em;
    float: left;
    line-height: 0.85;
    padding: 6px 10px 0 0;
    color: var(--ink);
  }
  .about-body .signature {
    margin-top: 32px;
    font-family: var(--f-display);
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
  }
  @media (max-width: 760px) { .about { grid-template-columns: 1fr; } }

  /* ---- Contact ---- */
  .contact {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: clamp(32px, 5vw, 80px);
    align-items: start;
  }
  .contact-side h3 {
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.05;
    margin-bottom: 24px;
  }
  .contact-side p { color: var(--ink-soft); max-width: 40ch; margin: 0 0 28px; }
  .contact-side .channels {
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-family: var(--f-meta);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .contact-side .channels a {
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    padding: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .contact-side .channels a:hover { color: var(--ink); border-color: var(--ink); }

  .contact-form { display: flex; flex-direction: column; gap: 22px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label {
    font-family: var(--f-meta);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-quiet);
  }
  .field input, .field textarea {
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--rule);
    padding: 10px 0;
    font-family: var(--f-body);
    font-size: 16px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    border-radius: 0;
  }
  .field textarea { resize: vertical; min-height: 120px; font-family: var(--f-body); }
  .field input:focus, .field textarea:focus { border-color: var(--ink); }
  .field.error input, .field.error textarea { border-color: #b23a2e; }
  .field .err-msg {
    font-family: var(--f-meta);
    font-size: 11px;
    color: #b23a2e;
    letter-spacing: 0.05em;
  }
  .submit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-top: 12px;
  }
  .btn {
    font-family: var(--f-meta);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 16px 26px;
    border: 1px solid var(--ink);
    color: var(--ink);
    background: transparent;
    transition: background 0.2s, color 0.2s;
  }
  .btn:hover { background: var(--ink); color: var(--bg); }
  .btn.sent { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .submit-note { font-size: 12px; color: var(--ink-quiet); font-family: var(--f-meta); letter-spacing: 0.08em; }

  @media (max-width: 760px) { .contact { grid-template-columns: 1fr; } }

  /* ---- Footer ---- */
  .footer {
    max-width: var(--max);
    margin: 0 auto;
    padding: 40px var(--gutter) 30px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    font-family: var(--f-meta);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-quiet);
  }
  @media (max-width: 560px) { .footer { flex-direction: column; gap: 12px; } }

  /* ---- Lightbox ---- */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: color-mix(in oklab, var(--bg) 92%, #000 8%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 4vw, 60px);
    animation: fade 0.25s ease;
  }
  [data-theme="dark"] .lightbox { background: color-mix(in oklab, var(--bg) 85%, #000 15%); }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .lightbox-card {
    background: var(--bg);
    border: 1px solid var(--rule);
    max-width: 1100px;
    width: 100%;
    max-height: 90vh;
    display: grid;
    grid-template-columns: 1.3fr 0.8fr;
    overflow: hidden;
    animation: rise 0.35s cubic-bezier(.22,1,.36,1);
  }
  @keyframes rise { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .lb-image {
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 400px;
  }
  .lb-image img { width: 100%; height: 100%; object-fit: contain; background: var(--paper); }
  .lb-body {
    padding: clamp(28px, 4vw, 48px);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .lb-body .eyebrow {
    font-family: var(--f-meta);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    margin-bottom: 14px;
  }
  .lb-body h3 {
    font-family: var(--f-display);
    font-style: italic;
    font-size: clamp(28px, 3vw, 38px);
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .lb-specs {
    display: grid;
    grid-template-columns: 90px 1fr;
    row-gap: 10px;
    font-size: 13px;
    padding: 20px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 24px;
  }
  .lb-specs dt {
    font-family: var(--f-meta);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    padding-top: 3px;
  }
  .lb-specs dd { margin: 0; color: var(--ink-soft); }
  .lb-body p { font-size: 14px; line-height: 1.7; color: var(--ink-soft); margin: 0 0 24px; }
  .lb-inquire {
    margin-top: auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .lb-close {
    position: absolute;
    top: 24px; right: 28px;
    font-family: var(--f-meta);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 8px 12px;
    z-index: 2;
  }
  .lb-close:hover { background: var(--ink); color: var(--bg); }
  @media (max-width: 860px) {
    .lightbox-card { grid-template-columns: 1fr; max-height: 95vh; }
    .lb-image { min-height: 280px; max-height: 50vh; }
  }

  /* ---- Tweaks Panel ---- */
  .tweaks-panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 200;
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 18px 20px;
    width: 260px;
    box-shadow: 0 20px 50px -15px rgba(0,0,0,0.25);
    font-family: var(--f-meta);
  }
  .tweaks-panel h4 {
    font-family: var(--f-meta);
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .tweak-group { margin-bottom: 14px; }
  .tweak-group:last-child { margin-bottom: 0; }
  .tweak-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    margin-bottom: 8px;
  }
  .tweak-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .tweak-options button {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 9px 6px;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    background: transparent;
    transition: all 0.2s;
  }
  .tweak-options button:hover { color: var(--ink); border-color: var(--ink-soft); }
  .tweak-options button.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* ---- Filters ---- */
  .gallery-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .gallery-nav button {
    font-family: var(--f-meta);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 18px;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .gallery-nav button:hover { color: var(--ink); }
  .gallery-nav button.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

</style>
</head>
<body>

/* ------------------------------------------------------------------

function PainterlyPlaceholder({ gallery, idx, label }) {
  const pal = palettes[gallery] || palettes["Seascapes"];
  const c1 = pal[idx % pal.length];
  const c2 = pal[(idx + 2) % pal.length];
  const c3 = pal[(idx + 4) % pal.length];
  const style = {
    background: `linear-gradient(${135 + idx * 17 % 90}deg, ${c1} 0%, ${c2} 55%, ${c3} 100%)`
  };
  return (
    <div className="placeholder" style={style}>
      <span style={{ position: "relative", zIndex: 1 }}>{label}</span>
    </div>);

}

function Piece({ work, idx, onClick }) {

  work.gallery === "Portraits" ? "4/5" :
  work.gallery === "Pet Portraits" ? "4/5" :
  idx % 3 === 0 ? "5/4" : "1/1";

  return (
    <article className="piece" onClick={() => onClick(work)}>
      <div className="frame" style={{ aspectRatio: aspect }}>
        {work.image ?
        <img src={work.image} alt={work.title} /> :
        <PainterlyPlaceholder gallery={work.gallery} idx={idx} label={`${work.gallery}\n${work.title}`} />
        }

}

/* ------------------------------------------------------------------

------------------------------------------------------------------ */
function Lightbox({ work, onClose }) {
  useEffect(() => {
    const handler = (e) => {if (e.key === "Escape") onClose();};
    window.addEventListener("keydown", handler);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", handler);
      document.body.style.overflow = "";
    };
  }, [onClose]);

  if (!work) return null;

  return (
    <div className="lightbox" onClick={onClose}>
      <button className="lb-close" onClick={onClose} aria-label="Close">Close ✕</button>
      <div className="lightbox-card" onClick={(e) => e.stopPropagation()}>
        <div className="lb-image">
          {work.image ?
          <img src={work.image} alt={work.title} /> :
          <PainterlyPlaceholder gallery={work.gallery} idx={0} label={`${work.gallery}\n${work.title}`} />
          }
        </div>
        <div className="lb-body">
          <div className="eyebrow">{work.gallery}</div>
          <h3>{work.title}</h3>
          <dl className="lb-specs">

/* ------------------------------------------------------------------
   Contact
------------------------------------------------------------------ */
function Contact() {
  const [form, setForm] = useState({ name: "", email: "", message: "" });
  const [errors, setErrors] = useState({});
  const [sent, setSent] = useState(false);

  const set = (k) => (e) => {
    setForm((f) => ({ ...f, [k]: e.target.value }));
    if (errors[k]) setErrors((er) => ({ ...er, [k]: null }));
  };

  const submit = (e) => {
    e.preventDefault();
    const errs = {};
    if (!form.name.trim()) errs.name = "Your name, please.";
    if (!form.email.trim()) errs.email = "An email address, please.";else
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) errs.email = "That doesn't look right.";
    if (!form.message.trim()) errs.message = "Say something.";else
    if (form.message.trim().length < 10) errs.message = "A little more, if you would.";

    if (Object.keys(errs).length) {setErrors(errs);return;}
    setSent(true);
    setTimeout(() => {setSent(false);setForm({ name: "", email: "", message: "" });}, 3000);
  };

  return (
    <section className="section" id="contact">
      <div className="section-head">
        <div>
          <div className="eyebrow">Get in touch</div>
          <h2>Contact &amp; <span className="serif-italic">inquiries</span></h2>
        </div>
      </div>

      <div className="contact">
        <div className="contact-side">
          <h3>Available for commissions and studio visits.</h3>
          <p>For portrait commissions, gallery enquiries, or to arrange a studio visit in Philadelphia, please send a note. I reply to every message.</p>
          <div className="channels">
            <a href="mailto:studio@stuartfriedberg.com">
              <span>studio@stuartfriedberg.com</span>
              <span>→</span>
            </a>
            <a href="https://instagram.com" target="_blank" rel="noreferrer">
              <span>Instagram · @stuartfriedberg</span>
              <span>→</span>
            </a>
            <a href="#">
              <span>Philadelphia, PA · studio</span>
              <span>→</span>
            </a>
          </div>
        </div>

        <form className="contact-form" onSubmit={submit} noValidate>
          <div className={`field ${errors.name ? "error" : ""}`}>
            <label htmlFor="name">Name</label>
            <input id="name" type="text" value={form.name} onChange={set("name")} />
            {errors.name && <div className="err-msg">{errors.name}</div>}
          </div>
          <div className={`field ${errors.email ? "error" : ""}`}>
            <label htmlFor="email">Email</label>
            <input id="email" type="email" value={form.email} onChange={set("email")} />
            {errors.email && <div className="err-msg">{errors.email}</div>}
          </div>
          <div className={`field ${errors.message ? "error" : ""}`}>
            <label htmlFor="message">Message</label>
            <textarea id="message" rows={5} value={form.message} onChange={set("message")} />
            {errors.message && <div className="err-msg">{errors.message}</div>}
          </div>
          <div className="submit-row">
            <button type="submit" className={`btn ${sent ? "sent" : ""}`} disabled={sent}>
              {sent ? "Sent — thank you ✓" : "Send message"}
            </button>
            <div className="submit-note">Usually a reply within a few days.</div>
          </div>
        </form>
      </div>
    </section>);

}

/* ------------------------------------------------------------------
   App
------------------------------------------------------------------ */
function App() {
  const [active, setActive] = useState("work");
  const [openWork, setOpenWork] = useState(null);
  const [theme, setTheme] = useState(TWEAKS.theme || "light");
  const [type, setType] = useState(TWEAKS.typePairing || "editorial");
  const [tweakMode, setTweakMode] = useState(false);

  // Persist theme/type on document + tell host
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    document.documentElement.setAttribute("data-type", type);
  }, [theme, type]);

  const updateTheme = (t) => {
    setTheme(t);
    try {window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { theme: t } }, "*");} catch (e) {}
  };
  const updateType = (t) => {
    setType(t);
    try {window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { typePairing: t } }, "*");} catch (e) {}
  };

  // Tweak mode host protocol
  useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === "__activate_edit_mode") setTweakMode(true);
      if (e.data.type === "__deactivate_edit_mode") setTweakMode(false);
    };
    window.addEventListener("message", handler);
    try {window.parent.postMessage({ type: "__edit_mode_available" }, "*");} catch (e) {}
    return () => window.removeEventListener("message", handler);
  }, []);

  // Scrollspy
  useEffect(() => {
    const sections = ["work", "shows", "about", "contact"];
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((ent) => {
        if (ent.isIntersecting) setActive(ent.target.id);
      });
    }, { rootMargin: "-30% 0px -60% 0px" });
    sections.forEach((id) => {
      const el = document.getElementById(id);
      if (el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);

  return (
    <>
      <Nav active={active} />
      <Hero />
      <Gallery onOpenWork={setOpenWork} />
      <Shows />
      <About />
      <Contact />
      <footer className="footer">
        <span>© {new Date().getFullYear()} Stuart Friedberg</span>
        <span>Site by the studio · Instagram @stuartfriedberg</span>
      </footer>
      {openWork && <Lightbox work={openWork} onClose={() => setOpenWork(null)} />}
      <TweaksPanel visible={tweakMode} theme={theme} setTheme={updateTheme} type={type} setType={updateType} />
    </>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
